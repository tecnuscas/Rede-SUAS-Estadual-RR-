<style>
  :root {
    --brand-primary: #115E59;
    --brand-primary-light: #14B8A6;
    --brand-secondary: #0F172A;
    --text-main: #1E293B;
    --text-muted: #475569;
    --bg-main: #F8FAFC;
    --bg-card: #FFFFFF;
    --border-ui: #E2E8F0;
    --radius-ui: 12px;
    --font-sans: 'Inter', -apple-system, sans-serif;
    --font-serif: 'Lora', serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --text-main: #F1F5F9;
      --text-muted: #94A3B8;
      --bg-main: #020617;
      --bg-card: #0F172A;
      --border-ui: #1E293B;
    }
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  body {
    margin: 0;
    background: var(--bg-main);
    background-image: 
      url('https://upload.wikimedia.org/wikipedia/commons/thumb/e/e4/S%C3%ADmbolo_da_Psicologia.svg/1200px-S%C3%ADmbolo_da_Psicologia.svg.png'),
      url('https://seeklogo.com/images/S/suas-logo-A78B0E8D10-seeklogo.com.png');
    background-repeat: no-repeat, no-repeat;
    background-position: bottom 5% right 5%, bottom 5% left 5%;
    background-size: 300px, 200px;
    background-attachment: fixed, fixed;
    color: var(--text-main);
    font-family: var(--font-sans);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  @media (prefers-color-scheme: dark) {
    body {
      background-image: 
        linear-gradient(rgba(2, 6, 23, 0.9), rgba(2, 6, 23, 0.9)),
        url('https://upload.wikimedia.org/wikipedia/commons/thumb/e/e4/S%C3%ADmbolo_da_Psicologia.svg/1200px-S%C3%ADmbolo_da_Psicologia.svg.png'),
        url('https://seeklogo.com/images/S/suas-logo-A78B0E8D10-seeklogo.com.png');
      background-size: cover, 300px, 200px;
    }
  }

  /* Ajuste para não atrapalhar a leitura nos cartões */
  .tech-card {
    position: relative;
    z-index: 1;
    background: var(--bg-card);
  }

  .container { max-width: 1400px; margin: 0 auto; padding: 0 1.5rem; }

  /* Header Técnico */
  header.hero {
    background: var(--brand-secondary);
    color: white;
    padding: 4rem 0;
  }

  .flag-stripe {
    height: 7px;
    background: linear-gradient(
      90deg,
      #0091C2 0%, #0091C2 34%,
      #FFFFFF 34%, #FFFFFF 40%,
      #009739 40%, #009739 92%,
      #ED1C24 92%, #ED1C24 100%
    );
  }

  .hero h1 .flag-star {
    color: #FEDD00;
    -webkit-text-stroke: 0.5px rgba(0,0,0,0.15);
    margin-right: 0.3rem;
    font-size: 0.7em;
    vertical-align: middle;
  }

  .hero h1 {
    font-family: var(--font-serif);
    font-size: 3rem;
    margin: 0;
    font-weight: 500;
    letter-spacing: -0.02em;
  }

  .hero p {
    color: #94A3B8;
    max-width: 700px;
    font-size: 1.1rem;
    margin-top: 1rem;
  }

  /* Controles de Navegação */
  .controls {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg-main);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border-ui);
    padding: 1rem 0;
    box-shadow: 0 4px 16px -8px rgba(15, 23, 42, 0.08);
  }

  .search-wrapper {
    display: flex;
    gap: 1rem;
    align-items: center;
  }

  .search-input {
    flex: 1;
    background: var(--bg-card);
    border: 1.5px solid var(--border-ui);
    padding: 0.8rem 1.2rem;
    border-radius: 8px;
    color: var(--text-main);
    font-family: var(--font-sans);
    font-size: 1rem;
    transition: all 0.2s;
  }

  .search-input:focus {
    border-color: var(--brand-primary);
    box-shadow: 0 0 0 3px rgba(17, 94, 89, 0.1);
  }

  .filter-bar {
    display: flex;
    gap: 0.5rem;
    margin-top: 1rem;
    overflow-x: auto;
    padding-bottom: 0.5rem;
    scrollbar-width: none;
  }

  .filter-chip {
    white-space: nowrap;
    background: var(--bg-card);
    border: 1px solid var(--border-ui);
    padding: 0.5rem 1rem;
    border-radius: 6px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    color: var(--text-muted);
    transition: all 0.2s;
  }

  .filter-chip.active {
    background: var(--brand-primary);
    color: white;
    border-color: var(--brand-primary);
  }

  /* Grid de Equipamentos */
  .equipment-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
    gap: 1.5rem;
    padding: 2rem 0;
  }

  .tech-card {
    background: var(--bg-card);
    border: 1px solid var(--border-ui);
    border-top: 3px solid var(--brand-primary);
    border-radius: var(--radius-ui);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .tech-card:hover {
    box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
    transform: translateY(-2px);
  }

  .card-top {
    padding: 1.5rem;
    border-bottom: 1px solid var(--border-ui);
    background: linear-gradient(180deg, rgba(17, 94, 89, 0.05), rgba(17, 94, 89, 0) 80%);
  }

  .card-top h3 {
    margin: 0;
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--brand-primary);
    line-height: 1.2;
  }

  .card-top .subtitle {
    font-size: 0.8rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 700;
    margin-top: 0.5rem;
    display: block;
  }

  .card-body {
    padding: 1.5rem;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .info-group {
    display: grid;
    grid-template-columns: 24px 1fr;
    gap: 0.75rem;
    font-size: 0.9rem;
  }

  .info-group svg {
    color: var(--brand-primary);
    margin-top: 0.2rem;
  }

  .label-tech {
    font-size: 0.7rem;
    font-weight: 800;
    color: var(--text-muted);
    text-transform: uppercase;
    display: block;
    margin-bottom: 0.2rem;
  }

  .desc-box {
    font-size: 0.85rem;
    color: var(--text-muted);
    background: var(--bg-main);
    padding: 1rem;
    border-radius: 8px;
    margin-top: 0.5rem;
  }

  .tech-notes {
    width: 100%;
    background: transparent;
    border: 1.5px dashed var(--border-ui);
    border-radius: 8px;
    padding: 1rem;
    font-family: var(--font-sans);
    font-size: 0.85rem;
    color: var(--text-main);
    resize: none;
    min-height: 100px;
  }

  /* Anexo de imagem nas anotações */
  .image-attach-wrapper {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .image-upload-label {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    cursor: pointer;
    width: 100%;
  }

  .image-attach-hint {
    font-size: 0.7rem;
    color: var(--text-muted);
    text-align: center;
  }

  .image-preview {
    position: relative;
    border: 1.5px solid var(--border-ui);
    border-radius: 8px;
    overflow: hidden;
    background: var(--bg-main);
  }

  .image-preview img {
    display: block;
    width: 100%;
    max-height: 220px;
    object-fit: contain;
    background: repeating-conic-gradient(#f1f5f9 0% 25%, #ffffff 0% 50%) 50% / 16px 16px;
  }

  .image-preview .image-remove-btn {
    position: absolute;
    top: 6px;
    right: 6px;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: none;
    background: rgba(15, 23, 42, 0.75);
    color: white;
    font-size: 0.9rem;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .image-preview .image-remove-btn:hover {
    background: #DC2626;
  }

  .image-error-msg {
    font-size: 0.75rem;
    color: #DC2626;
    font-weight: 600;
    text-align: center;
  }

  .card-actions {
    padding: 1.25rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    background: rgba(0,0,0,0.02);
  }

  .btn-tech {
    padding: 0.75rem;
    border-radius: 6px;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    border: 1px solid var(--border-ui);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    transition: all 0.2s;

  .btn-primary:hover { background: var(--brand-primary-light); }
  .btn-secondary { background: var(--bg-card); color: var(--text-main); }
  .btn-secondary:hover { background: var(--bg-main); }

  /* Sistema de Impressão Blindado A4 Paisagem - MULTI-PÁGINA CONTROLADA */
  #print-area { display: none; }
  @media print {
    @page { size: landscape; margin: 0.5cm; }

    /* Em vez de visibility:hidden (que mantém os elementos ocupando espaço
       no fluxo e gera páginas extras em branco), removemos tudo do fluxo
       com display:none. Assim só o #print-area fica visível na impressão. */
    body > *:not(#print-area) {
      display: none !important;
    }

    #print-area {
      display: block !important;
      position: static;
      width: 100%;
      background: white;
      z-index: 9999;
      padding: 0;
      margin: 0;
    }

    /* Cada .print-page é uma folha A4 paisagem própria. page-break-after
       força a quebra entre a ficha técnica e o anexo fotográfico (quando
       existir). O :last-child evita uma folha em branco extra quando só
       há uma página (sem imagem anexada). */
    #print-area .print-page {
      width: 28.7cm;
      height: 20cm;
      overflow: hidden;
      page-break-after: always;
    }
    #print-area .print-page:last-child {
      page-break-after: auto;
    }

    /* Força quebra de palavras em qualquer lugar no print */
    #print-area * { word-break: break-word !important; overflow-wrap: break-word !important; }
  }

  @media (max-width: 640px) {
    .equipment-grid { grid-template-columns: 1fr; }
    .hero h1 { font-size: 2rem; }
  }
</style>
</head>

const MAX_IMAGE_BYTES = 5 * 1024 * 1024; // 5 MB

function render() {
  const query = document.getElementById('mainSearch').value.toLowerCase();
  const cat = document.querySelector('.filter-chip.active').dataset.cat;
  const favs = JSON.parse(localStorage.getItem('favs') || '[]');
  const grid = document.getElementById('grid');

  const filtered = DATA.filter(i => {
    const matchSearch = i.name.toLowerCase().includes(query) || i.address.toLowerCase().includes(query) || i.desc.toLowerCase().includes(query);
    const isFav = favs.includes(i.id);
    const matchCat = cat === 'all' || 
                     (cat === 'fav' ? isFav : 
                     (cat === 'saude' ? (i.cat.includes('saude') || i.cat.includes('tea')) : 
                     (cat === 'social' ? (i.cat.includes('social') || i.cat.includes('idoso')) : 
                     i.cat.includes(cat))));
    return matchSearch && matchCat;
  });

  document.getElementById('counter').textContent = filtered.length;
  grid.innerHTML = filtered.map(i => {
    const imgData = localStorage.getItem('img_'+i.id);
    const imageBlock = imgData
      ? `<div class="image-preview">
           <img src="${imgData}" alt="Anexo de ${i.name}">
           <button type="button" class="image-remove-btn" title="Remover imagem" onclick="removeImage('${i.id}')">✕</button>
         </div>`
      : `<label class="btn-tech btn-secondary image-upload-label">
           ${ICONS.image} Anexar Imagem
           <input type="file" accept="image/*" style="display:none" onchange="handleImageUpload(event, '${i.id}')">
         </label>
         <div class="image-attach-hint">Formatos de imagem, até 5MB</div>`;

    return `
    <div class="tech-card">
      <div class="card-top">
        <div style="display:flex; justify-content:space-between; align-items:start;">
          <h3>${i.name}</h3>
          <button onclick="toggleFav('${i.id}')" style="background:none; border:none; cursor:pointer; color:${favs.includes(i.id) ? '#F59E0B' : '#CBD5E1'}">${ICONS.star}</button>
        </div>
        <span class="subtitle">${i.fullName}</span>
      </div>
      <div class="card-body">
        <div class="info-group">${ICONS.map}<div><span class="label-tech">Localização</span>${i.address}</div></div>
        <div class="info-group">${ICONS.clock}<div><span class="label-tech">Disponibilidade</span>${i.hours}</div></div>
        <div class="info-group">${ICONS.phone}<div><span class="label-tech">Contato Técnico</span>${i.phones.join(' · ')}</div></div>
        <div class="desc-box">
          <span class="label-tech">Escopo de Atuação</span>
          ${i.desc}
          <div style="margin-top:0.5rem; font-weight:600; color:var(--brand-primary); font-size:0.75rem;">SERVIÇOS: ${Array.isArray(i.services) ? i.services.join(', ') : i.services}</div>
        </div>
        <textarea class="tech-notes" placeholder="Anotações Técnicas / Conduta..." oninput="localStorage.setItem('note_${i.id}', this.value)">${localStorage.getItem('note_'+i.id) || ''}</textarea>
        <div class="image-attach-wrapper" id="img-wrap-${i.id}">
          ${imageBlock}
          <div class="image-error-msg" id="img-error-${i.id}" style="display:none;"></div>
        </div>
      </div>
      <div class="card-actions">
        <button class="btn-tech btn-secondary" onclick="share('${i.id}')">Compartilhar</button>
        <button class="btn-tech btn-primary" onclick="printGuide('${i.id}')">Gerar Guia</button>
      </div>
    </div>
  `;
  }).join('');
}

function showImageError(id, msg) {
  const el = document.getElementById('img-error-'+id);
  if (el) {
    el.textContent = msg;
    el.style.display = 'block';
  }
}

function handleImageUpload(event, id) {
  const file = event.target.files && event.target.files[0];
  if (!file) return;

  const errorEl = document.getElementById('img-error-'+id);
  if (errorEl) { errorEl.style.display = 'none'; errorEl.textContent = ''; }

  if (!file.type.startsWith('image/')) {
    showImageError(id, 'Selecione um arquivo de imagem válido.');
    event.target.value = '';
    return;
  }

  if (file.size > MAX_IMAGE_BYTES) {
    const sizeMb = (file.size / (1024*1024)).toFixed(1);
    showImageError(id, `Imagem muito grande (${sizeMb}MB). O limite é 5MB.`);
    event.target.value = '';
    return;
  }

  const reader = new FileReader();
  reader.onload = function() {
    try {
      localStorage.setItem('img_'+id, reader.result);
      render();
    } catch (e) {
      showImageError(id, 'Não foi possível salvar a imagem (limite de armazenamento do navegador atingido).');
    }
  };
  reader.onerror = function() {
    showImageError(id, 'Falha ao ler o arquivo de imagem.');
  };
  reader.readAsDataURL(file);
}

function removeImage(id) {
  localStorage.removeItem('img_'+id);
  render();
}

function toggleFav(id) {
  let f = JSON.parse(localStorage.getItem('favs') || '[]');
  f = f.includes(id) ? f.filter(x => x !== id) : [...f, id];
  localStorage.setItem('favs', JSON.stringify(f));
  render();
}

function share(id) {
  const i = DATA.find(x => x.id === id);
  const t = `*UNIDADE:* ${i.fullName}\n*ENDEREÇO:* ${i.address}\n*CONTATO:* ${i.phones.join(' / ')}`;
  window.open(`https://wa.me/?text=${encodeURIComponent(t)}`);
}

  // Ajuste automático do texto de "Conduta e Orientações" para caber em uma
  // única página sem cortar conteúdo. Reduz a fonte progressivamente até o
  // texto caber na altura disponível da caixa (mínimo 8px de legibilidade).
  const noteBox = document.getElementById('printNoteBox');
  if (noteBox) {
    let fontSize = 15;
    noteBox.style.fontSize = fontSize + 'px';
    while (noteBox.scrollHeight > noteBox.clientHeight && fontSize > 8) {
      fontSize -= 0.5;
      noteBox.style.fontSize = fontSize + 'px';
    }
  }

  window.print();
}

function exportData() {
  const notes = {};
  DATA.forEach(i => { const n = localStorage.getItem('note_'+i.id); if(n) notes[i.name] = n; });
  const b = new Blob([JSON.stringify(notes,null,2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(b);
  a.download = `rede_apoio_backup_${new Date().toISOString().split('T')[0]}.json`;
  a.click();
}

document.getElementById('mainSearch').addEventListener('input', render);
document.querySelectorAll('.filter-chip').forEach(c => c.addEventListener('click', () => {
  document.querySelector('.filter-chip.active').classList.remove('active');
  c.classList.add('active');
  render();
}));

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').then(() => console.log('PWA Active'));
  });
}

render();
</script>
</body>
</html>
