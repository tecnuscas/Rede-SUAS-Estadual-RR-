    :root {
      --bg-main: #0F172A;
      --bg-surface: #1E293B;
      --bg-muted: #334155;
      --text-main: #F8FAFC;
      --text-muted: #94A3B8;
      --border-base: #334155;

    }
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

  html, body {

    padding: 0;

    position: relative;
    overflow: hidden;
    text-align: left;
  }

    content: '';
    position: absolute;
    top: 0; right: 0; bottom: 0; left: 0;

  }

  .badge-ui {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: rgba(255,255,255,0.1);
    padding: 0.5rem 1rem;
    border-radius: 99px;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--brand-primary-light);
    margin-bottom: 1.5rem;
    border: 1px solid rgba(255,255,255,0.1);
  }

  h1 {
    font-family: var(--font-serif);
    font-style: italic;
    font-size: clamp(2.5rem, 8vw, 4rem);
    line-height: 1;
    margin: 0 0 1.5rem;
    font-weight: 400;
  }

  .hero-description {
    max-width: 600px;
    font-size: 1.15rem;
    color: #94A3B8;
    line-height: 1.5;
  }

  .controls {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg-main);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border-base);
    padding: 1.5rem 0;
    margin-bottom: 2rem;
  }

  .search-box { position: relative; flex-grow: 1; }
  .search-box input {
    width: 100%;
    padding: 1.1rem 1.5rem 1.1rem 3.25rem;
    border-radius: var(--radius-md);
    border: 1px solid var(--border-base);
    font-size: 1rem;
    background: var(--bg-surface);
    color: var(--text-main);
    transition: all 0.3s;
    box-shadow: var(--shadow-sm);
  }

  .search-box input:focus { border-color: var(--brand-primary); box-shadow: 0 0 0 4px rgba(17, 94, 89, 0.1); }
  .search-box svg { position: absolute; left: 1.1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); }

  .filter-group {
    display: flex;
    gap: 0.75rem;
    margin-top: 1.5rem;
    overflow-x: auto;
    padding-bottom: 0.5rem;
    scrollbar-width: none;
  }
  .filter-group::-webkit-scrollbar { display: none; }

  .filter-btn {
    white-space: nowrap;
    padding: 0.75rem 1.5rem;
    border-radius: 99px;
    border: 1px solid var(--border-base);
    background: var(--bg-surface);
    font-weight: 600;
    font-size: 0.875rem;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--text-muted);
  }
  .filter-btn.active { background: var(--brand-primary); border-color: var(--brand-primary); color: white; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
    gap: 1.5rem;
    margin-bottom: 4rem;
  }

  .card {
    background: var(--bg-surface);
    border-radius: var(--radius-md);
    border: 1px solid var(--border-base);
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: var(--brand-primary-light); }

  .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; }
  .card-title h3 { margin: 0 0 0.25rem; font-size: 1.25rem; font-weight: 800; color: var(--brand-primary); }
  .card-title p { margin: 0; font-size: 0.8rem; color: var(--text-muted); font-weight: 600; }

  .fav-btn {
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    padding: 5px;
    transition: transform 0.2s;
  }
  .fav-btn.active { color: var(--brand-accent); }
  .fav-btn:active { transform: scale(1.3); }

  .status-dot {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.65rem;
    font-weight: 800;
    text-transform: uppercase;
    padding: 0.35rem 0.75rem;
    border-radius: 99px;

  .status-dot.open { background: #DCFCE7; color: #166534; }
  .status-dot.closed { background: #FEE2E2; color: #991B1B; }

  .info-stack { display: flex; flex-direction: column; gap: 0.75rem; font-size: 0.9rem; }

  .info-row svg { color: var(--brand-primary); flex-shrink: 0; margin-top: 2px; }

    background: var(--bg-muted);
    border-radius: var(--radius-sm);
    padding: 1rem;

    width: 100%;
    border: none;
    background: transparent;
    font-family: inherit;
    font-size: 0.85rem;
    color: var(--text-main);
    resize: none;
    min-height: 80px;

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    padding: 0.75rem;
    border-radius: var(--radius-sm);
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid transparent;
    text-decoration: none;

  .btn-solid { background: var(--brand-primary); color: white; }
  .btn-outline { background: transparent; border-color: var(--border-base); color: var(--text-main); }

  .install-banner {
    display: none;
    position: fixed;
    bottom: 2rem;
    left: 50%;

    color: white;
    padding: 1rem 1.5rem;
    border-radius: var(--radius-lg);

  #print-section { display: none; }

  @media (max-width: 640px) {

</style>
</head>

let deferredPrompt;
const installBanner = document.getElementById('install-banner');
const installBtn = document.getElementById('install-btn');

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  installBanner.style.display = 'flex';
});

installBtn.addEventListener('click', async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === 'accepted') installBanner.style.display = 'none';
    deferredPrompt = null;
  }
});

function isOpen(hours) {
  if (!hours || hours.length === 0) return true;
  const now = new Date();
  const day = now.getDay();
  const time = now.getHours() * 100 + now.getMinutes();
  return hours.some(h => h.days.includes(day) && time >= parseInt(h.open.replace(':','')) && time <= parseInt(h.close.replace(':','')));
}

function toggleFav(id) {
  const favs = JSON.parse(localStorage.getItem('favs') || '[]');
  const index = favs.indexOf(id);
  if (index > -1) favs.splice(index, 1);
  else favs.push(id);
  localStorage.setItem('favs', JSON.stringify(favs));
  renderEquipment();
}

function renderEquipment() {
  const searchTerm = document.getElementById('search').value.toLowerCase();
  const activeCat = document.querySelector('.filter-btn.active').dataset.cat;
  const favs = JSON.parse(localStorage.getItem('favs') || '[]');
  const list = document.getElementById('equipment-list');
  const countEl = document.getElementById('result-count');

  const filtered = DATA.filter(item => {
    const matchesSearch = item.name.toLowerCase().includes(searchTerm) || item.address.toLowerCase().includes(searchTerm) || item.tags.some(t => t.toLowerCase().includes(searchTerm));
    const isFav = favs.includes(item.id);
    const matchesCat = activeCat === 'all' || (activeCat === 'fav' ? isFav : item.cat.includes(activeCat));
    return matchesSearch && matchesCat;
  });

  countEl.textContent = filtered.length;
  list.innerHTML = filtered.map(item => {
    const open = isOpen(item.hours);
    const isFav = favs.includes(item.id);
    return `
      <div class="card">
        <div class="card-header">
          <div class="card-title">
            <h3>${item.name}</h3>
            <p>${item.fullName}</p>
          </div>
          <button class="fav-btn ${isFav ? 'active' : ''}" onclick="toggleFav('${item.id}')">${ICONS.star}</button>
        </div>
        <div class="status-dot ${open ? 'open' : 'closed'}">${open ? 'Aberto Agora' : 'Fechado'}</div>
        <div class="info-stack">
          <div class="info-row">${ICONS.map}<span>${item.address}</span></div>
          <div class="info-row">${ICONS.clock}<span>${item.hoursText}</span></div>
          <div class="info-row">${ICONS.phone}<span>${item.phones.join(' · ')}</span></div>
        </div>
        <div class="notes-box">
          <textarea class="notes-textarea" placeholder="Minhas anotações..." oninput="localStorage.setItem('note_${item.id}', this.value)">${localStorage.getItem('note_' + item.id) || ''}</textarea>
        </div>
        <div class="card-footer">
          <button class="btn btn-outline" onclick="shareUnit('${item.id}')">Compartilhar</button>
          <button class="btn btn-solid" onclick="printCard('${item.id}')">Encaminhar</button>
        </div>
      </div>
    `;
  }).join('');
  document.getElementById('empty-state').style.display = filtered.length ? 'none' : 'block';
}

function shareUnit(id) {
  const item = DATA.find(d => d.id === id);
  const text = `*Rede de Apoio BV*\n\n*Unidade:* ${item.fullName}\n*Endereço:* ${item.address}\n*Horário:* ${item.hoursText}\n*Contato:* ${item.phones.join(' / ')}`;
  window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
}

        <div style="display: grid; grid-template-columns: 1fr 350px; gap: 30px;">
          <div>
            <p><strong>Ao Serviço:</strong><br><span style="font-size: 24px; color: #115E59; font-weight: 800;">${item.fullName}</span></p>
            <div style="margin-top: 20px;"><strong>Conduta:</strong><div style="margin-top: 10px; padding: 20px; border: 1.5px solid #115E59; border-radius: 8px; min-height: 150px; background: white; white-space: pre-wrap;">${note || 'Encaminhamento para avaliação e acompanhamento especializado.'}</div></div>
          </div>
          <div style="background: #F1F5F9; padding: 25px; border-radius: 12px; border: 2px solid #115E59;">
            <h3 style="margin-top: 0; color: #115E59;">Dados da Unidade</h3>
            <p><strong>Endereço:</strong><br>${item.address}</p>
            <p><strong>Contato:</strong><br>${item.phones.join(' · ')}</p>
          </div>
        </div>
        <div style="margin-top: 80px; display: flex; justify-content: space-between; align-items: flex-end;">
          <p>Boa Vista - RR, ${date}.</p>
          <div style="text-align: center; width: 250px;"><div style="border-top: 1px solid #000; margin-bottom: 5px;"></div><p>Paulo Xavier</p><p style="font-size: 12px;">Psicólogo · CRP-20/09816</p></div>
        </div>
      </div>
    </div>
  `;
  window.print();
}

function exportNotes() {
  const notes = {};
  DATA.forEach(i => { const n = localStorage.getItem('note_'+i.id); if(n) notes[i.name] = n; });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify(notes, null, 2)], {type: 'application/json'}));
  a.download = `backup_notas_${new Date().toISOString().split('T')[0]}.json`;
  a.click();
}

document.getElementById('search').addEventListener('input', renderEquipment);
document.querySelectorAll('.filter-btn').forEach(btn => btn.addEventListener('click', () => {
  document.querySelector('.filter-btn.active').classList.remove('active');
  btn.classList.add('active');
  renderEquipment();
}));

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').then(reg => console.log('SW OK')).catch(err => console.log('SW ERR', err));
  });
}

renderEquipment();
</script>
</body>
</html>
